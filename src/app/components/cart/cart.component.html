<div class="card p-3">
  <h4>Your Cart</h4>
  <div *ngIf="items.length === 0" class="text-muted">Cart is empty</div>
  <ul class="list-group">
    <li class="list-group-item" *ngFor="let it of items">
      <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center">
          <img [src]="it.image" style="width:60px;height:45px;object-fit:cover;margin-right:10px" loading="lazy" alt="{{it.name}}"/>
          <div>
            <strong>{{it.name}}</strong>
            <div class="text-muted small">{{it.price | currency:'INR':'symbol':'1.0-2'}}</div>
          </div>
        </div>
        <div class="d-flex align-items-center">
          <input class="form-control form-control-sm me-2" style="width:80px" [value]="it.qty" (change)="changeQty(it.id, $event.target.value)">
          <div class="me-3">{{(it.price * it.qty) | currency:'INR':'symbol':'1.0-2'}}</div>
          <button class="btn btn-sm btn-danger" (click)="remove(it.id)">Remove</button>
        </div>
      </div>
    </li>
  </ul>
  <div class="mt-3 d-flex justify-content-between align-items-center">
    <strong>Total: {{total | currency:'INR':'symbol':'1.0-2'}}</strong>
    <button class="btn btn-success" [disabled]="items.length===0" (click)="checkout()">Checkout</button>
  </div>
</div>
