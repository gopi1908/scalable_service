<div *ngIf="item" class="card p-3">
  <div class="row g-3">
    <div class="col-md-5">
      <img [src]="item.image" style="width:100%;height:220px;object-fit:cover" loading="lazy" alt="{{item.name}}"/>
    </div>
    <div class="col-md-7">
      <h3>{{item.name}}</h3>
      <p class="text-muted">{{item.price | currency:'INR':'symbol':'1.0-2'}}</p>
      <p>{{item.description}}</p>
      <div class="d-flex gap-2">
        <button class="btn btn-success" (click)="buy()">Buy</button>
        <button class="btn btn-outline-success" (click)="addToCart()">Add to cart</button>
        <a class="btn btn-link" routerLink="/dashboard">Back</a>
      </div>
    </div>
  </div>
</div>
