  <div class="d-flex justify-content-between align-items-center mb-3">
  <h3>Items</h3>
  <div>
    <a class="btn btn-outline-primary me-2" routerLink="/cart">Cart</a>
    <a class="btn btn-outline-secondary me-2" routerLink="/orders">Orders</a>
    <a class="btn btn-outline-danger" (click)="logout()">Logout</a>
  </div>
</div>

<div class="mb-3 input-group">
  <input class="form-control" placeholder="Search" [(ngModel)]="query" (input)="search()">
  <button class="btn btn-primary" (click)="search()">Search</button>
</div>

<div class="row">
  <div class="col-sm-6 col-md-4" *ngFor="let it of items">
    <div class="card mb-3 h-100">
      <img [src]="it.image" class="card-img-top" style="height:180px;object-fit:cover" loading="lazy" alt="{{it.name}}">
      <div class="card-body d-flex flex-column">
        <h5 class="card-title">{{it.name}}</h5>
        <p class="card-text text-muted mb-2">{{it.price | currency:'INR':'symbol':'1.0-2'}}</p>
        <p class="text-muted small">{{it.description}}</p>
        <div class="mt-auto d-flex gap-2">
          <button class="btn btn-sm btn-primary" (click)="view(it.id)">View</button>
          <button class="btn btn-sm btn-outline-success" (click)="addToCart(it)">Add to cart</button>
        </div>
      </div>
    </div>
  </div>
</div>
